name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Diagnose and Fix Project Structure
        run: |
          echo "=== لیست تمام فایل‌های پوشه اصلی ==="
          ls -R
          echo "==================================="
          
          # جستجوی غیرحساس به حروف کوچک و بزرگ برای فایل تنظیمات
          SETTINGS_FILE=$(find . -iname "settings.gradle*" | head -n 1)
          
          if [ -z "$SETTINGS_FILE" ]; then
            echo "هشدار: settings.gradle پیدا نشد. بررسی فایل جایگزین..."
            # اگر فایل تنظیمات نبود، بررسی می‌کنیم آیا فایل ساخت اصلی در ریشه هست یا نه
            if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
              echo "فایل build.gradle در پوشه اصلی پیدا شد."
              PROJ_DIR="."
            else
              echo "خطا: هیچ فایل ساخت گریدلی در پروژه پیدا نشد!"
              exit 1
            fi
          else
            PROJ_DIR=$(dirname "$SETTINGS_FILE")
            echo "پروژه اندروید در این مسیر پیدا شد: $PROJ_DIR"
          fi
          
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV
          
          # پاک کردن آدرس جاوای هاردکد شده
          if [ -f "$PROJ_DIR/gradle.properties" ]; then
            sed -i '/org.gradle.java.home/d' "$PROJ_DIR/gradle.properties"
            echo "آدرس جاوای هاردکد شده با موفقیت پاک شد."
          fi

      - name: Change wrapper permissions
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew -p ${{ env.PROJ_DIR }} assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
