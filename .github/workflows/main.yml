name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Discover and Fix Project Structure
        run: |
          # یک دستور ساده‌تر و بدون خطا برای پیدا کردن مسیر پروژه
          SETTINGS_FILE=$(find . -name "settings.gradle*" | head -n 1)
          
          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: settings.gradle not found!"
            exit 1
          fi
          
          PROJ_DIR=$(dirname "$SETTINGS_FILE")
          echo "Found project in: $PROJ_DIR"
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV
          
          # پاک کردن آدرس جاوای هاردکد شده
          if [ -f "$PROJ_DIR/gradle.properties" ]; then
            sed -i '/org.gradle.java.home/d' "$PROJ_DIR/gradle.properties"
            echo "Hardcoded java.home removed successfully!"
          fi

      - name: Change wrapper permissions
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew -p ${{ env.PROJ_DIR }} assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
